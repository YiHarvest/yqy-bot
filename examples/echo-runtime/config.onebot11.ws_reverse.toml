[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["onebot11"]
plugins = ["src/echo_runtime/plugins/echo.py:EchoPlugin"]
superusers = ["echo-user"]

[runtime.hot_reload]
enabled = true
interval = 1.0

[adapter.onebot11]
mode = "ws-reverse"
host = "127.0.0.1"
port = 8080
path = "/onebot/v11/ws"
access_token = ""
platform = "qq"
api_timeout = 10.0

[plugin.echo]
greeting = "你好，我是 iamai 反向 WS 示例运行时。"

[plugin.management]
allow_reload = true
allow_introspection = true
