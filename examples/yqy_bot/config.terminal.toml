[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["terminal"]
plugin_dirs = ["src/yqy_bot/plugins"]
python_paths = ["src", "services"]
superusers = ["yqy"]

[runtime.hot_reload]
enabled = true
interval = 1.0

[adapter.terminal]
prompt = "yqy> "
output_prefix = "yqy-bot> "
user_id = "yqy"
self_id = "yqy-bot"

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true
