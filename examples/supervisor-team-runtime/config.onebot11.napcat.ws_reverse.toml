[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["onebot11"]
plugin_dirs = ["src/supervisor_team_runtime/plugins"]
python_paths = ["src"]
superusers = ["supervisor-user"]

[runtime.hot_reload]
enabled = true
interval = 1.0
config = true

[adapter.onebot11]
mode = "ws-reverse"
host = "127.0.0.1"
port = 8082
path_event = "/event"
path_api = "/api"
access_token = ""
platform = "qq"
api_timeout = 10.0

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true

[plugin.workers]
worker_temperature = 0.8

[plugin.workers.llm]
temperature = 0.7
max_tokens = 520

[plugin.supervisor.llm]
temperature = 0.5
max_tokens = 650
