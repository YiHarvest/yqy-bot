name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-rust:
    name: Lint / Rust / Config
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-local-path: .uv-cache

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync development dependencies
        run: uv sync --locked --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Rust tests
        run: cargo test

      - name: Validate example configs
        run: bash scripts/check_example_configs.sh

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-local-path: .uv-cache

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync development dependencies
        run: uv sync --locked --group dev

      - name: Run pytest
        run: uv run pytest

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-local-path: .uv-cache

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync documentation dependencies
        run: uv sync --locked --group dev --group docs

      - name: Build Sphinx docs
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html
