[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["terminal"]
plugin_dirs = ["src/arcade_runtime/plugins"]
python_paths = ["src"]
superusers = ["player-one"]

[runtime.hot_reload]
enabled = true
interval = 1.0

[adapter.terminal]
prompt = "arcade> "
output_prefix = "arcade-runtime> "
user_id = "player-one"
self_id = "arcade-host"

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true

[plugin.session]
starting_coins = 20

[plugin.arcade]
wheel = [
  ["meteor", -6],
  ["treasure", 12],
  ["lucky cat", 8],
  ["banana peel", -3],
  ["golden fish", 15],
]

[plugin.quests]
daily_goal = 30
