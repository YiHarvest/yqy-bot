[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["onebot11"]
plugin_dirs = ["src/planner_executor_runtime/plugins"]
python_paths = ["src"]
superusers = ["planner-user"]

[runtime.hot_reload]
enabled = true
interval = 1.0
config = true

[adapter.onebot11]
mode = "ws-reverse"
host = "127.0.0.1"
port = 8082
path_event = "/event"
path_api = "/api"
access_token = ""
platform = "qq"
api_timeout = 10.0

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true

[plugin.session]
history_limit = 6

[plugin.planner]
max_steps = 4

[plugin.planner.llm]
temperature = 0.4
max_tokens = 700

[plugin.executor.llm]
temperature = 0.7
max_tokens = 700
