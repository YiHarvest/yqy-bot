[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["terminal"]
plugin_dirs = ["src/react_runtime/plugins"]
python_paths = ["src"]
superusers = ["react-user"]

[runtime.hot_reload]
enabled = true
interval = 1.0

[adapter.terminal]
prompt = "react> "
output_prefix = "react-runtime> "
user_id = "react-user"
self_id = "react-runtime"

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true

[plugin.memory]
note_limit = 12
trace_limit = 6

[plugin.reactor]
max_turns = 5

[plugin.reactor.llm]
temperature = 0.5
max_tokens = 500

[plugin.mcp.mcp_server.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
