[runtime]
log_level = "INFO"
command_prefixes = ["/"]
adapters = ["onebot11"]
plugin_dirs = ["src/yqy_bot/plugins"]
python_paths = ["src", "services"]
superusers = ["738151903"]

[runtime.hot_reload]
enabled = true
interval = 1.0

[state]
backend = "json"
path = ".iamai/state.json"

[adapter.onebot11]
mode = "ws-reverse"
host = "127.0.0.1"
port = 8082
path_event = "/event"
path_api = "/api"
access_token = ""
platform = "qq"
api_timeout = 10.0

[plugin.management]
allow_reload = true
allow_config_reload = true
allow_introspection = true

[plugin.yqy_chat.llm]
temperature = 0.7
max_tokens = 512
