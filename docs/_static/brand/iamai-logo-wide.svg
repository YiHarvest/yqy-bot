<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">iamai</title>
  <desc id="desc">iamai wordmark with black hole agent mark — event horizon, accretion ring, and inflow streams.</desc>

  <!-- === Mark (left side, centered vertically) === -->

  <!-- Outer glow -->
  <ellipse cx="150" cy="160" rx="118" ry="50" fill="none" stroke="#818cf8" stroke-width="22" opacity="0.06" transform="rotate(-12 150 160)"/>

  <!-- Inflow stream 1 -->
  <path d="M36 56 Q74 78 86 118 Q94 142 110 152"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <path d="M36 56 Q74 78 86 118 Q94 142 110 152"
        fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Inflow stream 2 -->
  <path d="M32 258 Q68 228 86 188 Q94 168 110 158"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M32 258 Q68 228 86 188 Q94 168 110 158"
        fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Inflow stream 3 -->
  <path d="M256 186 Q218 150 198 145 Q180 142 174 155"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <path d="M256 186 Q218 150 198 145 Q180 142 174 155"
        fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Accretion ring — back -->
  <path d="M42 160 A108 42 0 0 1 258 160"
        fill="none" stroke="#6366f1" stroke-width="10" stroke-linecap="round"
        transform="rotate(-12 150 160)"/>

  <!-- Event horizon -->
  <circle cx="150" cy="160" r="60" fill="#1e293b"/>
  <circle cx="150" cy="160" r="60" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Accretion ring — front -->
  <path d="M42 160 A108 42 0 0 0 258 160"
        fill="none" stroke="#6366f1" stroke-width="14" stroke-linecap="round"
        transform="rotate(-12 150 160)"/>
  <path d="M42 160 A108 42 0 0 0 258 160"
        fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round"
        transform="rotate(-12 150 160)"/>

  <!-- Bright spot -->
  <circle cx="242" cy="144" r="8" fill="#c7d2fe"/>
  <circle cx="242" cy="144" r="14" fill="#818cf8" opacity="0.22"/>
  <circle cx="242" cy="144" r="22" fill="#818cf8" opacity="0.07"/>

  <!-- Highlight on sphere -->
  <ellipse cx="130" cy="138" rx="18" ry="10" fill="#334155" opacity="0.3"
           transform="rotate(-20 130 138)"/>

  <!-- === Wordmark (right side) === -->
  <text x="318" y="206" fill="#1e293b"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="102" font-weight="720" letter-spacing="-4">iamai</text>
</svg>
